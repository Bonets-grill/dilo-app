name: build-and-test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# CN-020: minimal permissions on GITHUB_TOKEN. Build+test never needs write.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # CN-021: pin to 40-char SHA (actions/checkout v4.2.2). Dependabot
        # for github-actions keeps this current. Tags are mutable and the
        # tj-actions incident (March 2025) showed why pinning matters.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        # actions/setup-node v4.4.0 pinned to SHA.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npx jest --no-cache --ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fozuopfxequexdyivrqy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvenVvcGZ4ZXF1ZXhkeWl2cnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjUyMzUsImV4cCI6MjA5MTI0MTIzNX0.aYpQgcot3YU8yL9j09xqh3-msPTjBGhlaeUeJLc76K0
          SUPABASE_SERVICE_ROLE_KEY: placeholder-for-build-only
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDssBQOdh9kRyedu3UtxTvTgnrnv3-KWuo1HlgQVM8VH0zaDggvUhQZaDUY5N1M9opHd2K0KdgipqJX2nbUln_U
          VAPID_PRIVATE_KEY: placeholder
          OPENAI_API_KEY: placeholder
          FINNHUB_API_KEY: placeholder

      - name: Build summary
        if: always()
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅ Compiled" >> $GITHUB_STEP_SUMMARY
