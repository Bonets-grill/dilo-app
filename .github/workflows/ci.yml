name: build-and-test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npx jest --no-cache --ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fozuopfxequexdyivrqy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvenVvcGZ4ZXF1ZXhkeWl2cnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjUyMzUsImV4cCI6MjA5MTI0MTIzNX0.aYpQgcot3YU8yL9j09xqh3-msPTjBGhlaeUeJLc76K0
          SUPABASE_SERVICE_ROLE_KEY: placeholder-for-build-only
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDssBQOdh9kRyedu3UtxTvTgnrnv3-KWuo1HlgQVM8VH0zaDggvUhQZaDUY5N1M9opHd2K0KdgipqJX2nbUln_U
          VAPID_PRIVATE_KEY: placeholder
          OPENAI_API_KEY: placeholder
          FINNHUB_API_KEY: placeholder

      - name: Build summary
        if: always()
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅ Compiled" >> $GITHUB_STEP_SUMMARY
